<svg viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#5C6884"/></marker>
    <marker id="ac" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#46D2F0"/></marker>
    <style>
      .chip{fill:#151B2B;stroke:#28324A;stroke-width:1}
      .t{fill:#E7ECF6;font-size:13px}
      .s{fill:#8A95AC;font-size:10.5px}
      .lb{font-size:10px;letter-spacing:.05em}
      .eyebrow{fill:#46D2F0;font-size:12px;letter-spacing:.22em;opacity:.85}
    </style>
  </defs>

  <rect x="1" y="1" width="998" height="338" rx="16" fill="#0E1220" stroke="#1E2638"/>
  <text x="34" y="40" class="eyebrow">STAKKER — TASK LIFECYCLE</text>

  <!-- row nodes y center 160 -->
  <rect x="45" y="138" width="90" height="44" rx="9" class="chip"/><text x="90" y="164" class="t" text-anchor="middle">Backlog</text>
  <rect x="165" y="138" width="90" height="44" rx="9" class="chip"/><text x="210" y="164" class="t" text-anchor="middle">Claim</text>
  <rect x="300" y="138" width="150" height="44" rx="9" class="chip"/><text x="375" y="157" class="t" text-anchor="middle">Work</text><text x="375" y="172" class="s" text-anchor="middle">fresh context window</text>
  <rect x="486" y="138" width="104" height="44" rx="9" class="chip"/><text x="538" y="164" class="t" text-anchor="middle">Session log</text>
  <!-- review diamond center 660 -->
  <path d="M600,160 L660,120 L720,160 L660,200 Z" fill="#151B2B" stroke="#46D2F0" stroke-width="1.4"/>
  <text x="660" y="164" class="t" text-anchor="middle" font-size="12">Review gates</text>
  <rect x="772" y="138" width="100" height="44" rx="9" class="chip"/><text x="822" y="164" class="t" text-anchor="middle">Evaluation</text>
  <rect x="892" y="138" width="104" height="44" rx="9" class="chip"/><text x="944" y="164" class="t" text-anchor="middle">Retro → docs</text>

  <!-- forward arrows -->
  <g fill="none" stroke="#5C6884" stroke-width="1.4" marker-end="url(#a)">
    <path d="M135,160 L163,160"/>
    <path d="M255,160 L298,160"/>
    <path d="M450,160 L484,160"/>
    <path d="M590,160 L598,160"/>
    <path d="M720,160 L770,160"/>
    <path d="M872,160 L890,160"/>
  </g>
  <rect x="722" y="130" width="60" height="15" rx="3" fill="#0E1220"/><text x="752" y="141" class="lb" fill="#8A95AC" text-anchor="middle">approved</text>

  <!-- changes requested loop: review top -> work top -->
  <path d="M660,120 C660,84 500,86 375,86 C375,86 375,110 375,136" fill="none" stroke="#5C6884" stroke-width="1.3" stroke-dasharray="none" marker-end="url(#a)"/>
  <rect x="452" y="78" width="130" height="16" rx="3" fill="#0E1220"/><text x="517" y="90" class="lb" fill="#8A95AC" text-anchor="middle">changes requested</text>

  <!-- feedback: retro -> backlog (dashed cyan, below) -->
  <path d="M944,182 C944,270 520,290 90,290 C90,290 90,230 90,184" fill="none" stroke="#46D2F0" stroke-width="1.4" stroke-dasharray="5 5" marker-end="url(#ac)"/>
  <rect x="384" y="282" width="256" height="16" rx="3" fill="#0E1220"/><text x="512" y="294" class="lb" fill="#46D2F0" text-anchor="middle">feeds back · lowers future token cost</text>
</svg>
